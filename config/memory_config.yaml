# Memory Layer runtime configuration

paths:
  sqlite_db: data/memory.db
  chroma_dir: data/chroma
  usage_log: data/usage.jsonl

embedding:
  model_name: all-MiniLM-L6-v2
  allow_model_download_during_setup: true

consolidation:
  similarity_threshold: 0.88

staleness:
  # Per-type shelf life in days. Memories older than this are flagged for review.
  # null = never stale
  observation: 30
  progress: 30
  decision: 90
  preference: null
  relationship: null

runtime:
  enforce_offline: true

# Canonical namespace registry
# Rule: namespace = git repo directory name, kebab-case
# Aliases are auto-resolved to canonical names at write time
namespaces:
  unscoped_target: _unscoped
  canonical:
    # Reserved
    global:
      aliases: []
    private:
      aliases: []
    _unscoped:
      aliases: []

    # Infrastructure — _shared/
    memory:
      aliases: [memory-layer]
    knowledge-base:
      aliases: []
    krypton:
      aliases: [project-krypton]
    nerve-center:
      aliases: [project-nerve-center]
    work-management:
      aliases: []
    adf:
      aliases: []
    capabilities-registry:
      aliases: []
    diagram-forge:
      aliases: []
    link-triage-pipeline:
      aliases: [project-link-triage]
    pike-agents:
      aliases: []

    # Client projects — clients/
    even-ground:
      aliases: [project-even-ground, project-evenground, even-ground-native, project-even-ground-native]
    pike:
      aliases: [pike-acm, project-pike-acm, project-acm]
    risk:
      aliases: [clients/risk, ai-risk-tools]
    agf:
      aliases: [AGF]
    dowell:
      aliases: []
    tcdc:
      aliases: [tcdc-website-prototype]
    vet:
      aliases: [project-vetmate, vetmate]

client_profiles:
  claude-code:
    allowed_namespaces: [global, memory, krypton, knowledge-base, capabilities-registry, adf, even-ground, pike, risk, agf, diagram-forge, work-management, nerve-center]
    can_cross_scope: false
    can_access_private: false
  claude-opus:
    allowed_namespaces: [global, memory, krypton, knowledge-base, capabilities-registry, adf, even-ground, pike, risk, agf, diagram-forge, work-management, nerve-center]
    can_cross_scope: false
    can_access_private: false
  krypton:
    allowed_namespaces: [global, krypton, memory, knowledge-base, capabilities-registry, adf, even-ground, pike, risk, agf, work-management, nerve-center]
    can_cross_scope: true
    can_access_private: false
  codex:
    allowed_namespaces: [global, memory, krypton, knowledge-base, capabilities-registry, adf, even-ground, pike, risk, agf, diagram-forge, work-management, nerve-center]
    can_cross_scope: false
    can_access_private: false
  adf:
    allowed_namespaces: [global, adf]
    can_cross_scope: false
    can_access_private: false
  maintenance:
    allowed_namespaces: [global, memory, krypton, knowledge-base, capabilities-registry, adf, even-ground, pike, risk, agf, diagram-forge, work-management, nerve-center, vet, dowell, tcdc, link-triage-pipeline, pike-agents, _unscoped]
    can_cross_scope: true
    can_access_private: false
  nerve-center:
    allowed_namespaces: [global]
    can_cross_scope: true
    can_access_private: false
  weekly-digest:
    allowed_namespaces: [global]
    can_cross_scope: true
    can_access_private: false
