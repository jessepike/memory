# Memory Layer runtime configuration

paths:
  sqlite_db: data/memory.db
  chroma_dir: data/chroma
  usage_log: data/usage.jsonl

embedding:
  model_name: all-MiniLM-L6-v2
  allow_model_download_during_setup: true

consolidation:
  similarity_threshold: 0.92

runtime:
  enforce_offline: true

client_profiles:
  claude-code:
    allowed_namespaces: [global, memory-layer, krypton, knowledge-base, capabilities-registry, adf]
    can_cross_scope: false
    can_access_private: false
  krypton:
    allowed_namespaces: [global, krypton, memory-layer, knowledge-base, capabilities-registry, adf]
    can_cross_scope: true
    can_access_private: false
  adf:
    allowed_namespaces: [global, adf]
    can_cross_scope: false
    can_access_private: false
